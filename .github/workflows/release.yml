name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-archive:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Archive folder using 7z
      run: |
        7z a profile_checker.7z ./profile_checker/

    - name: Upload Asset to Github Release
      uses: softprops/action-gh-release@v2
      with:
        files: profile_checker.7z
